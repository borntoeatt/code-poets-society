name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/code-poets-society:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/code-poets-society:buildcache,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/code-poets-society:latest
            ${{ secrets.DOCKER_USERNAME }}/code-poets-society:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/code-poets-society:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
