apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-poets-society
  namespace: default
spec:
  replicas: 2  # Will be managed by HPA
  selector:
    matchLabels:
      app: code-poets-society
  template:
    metadata:
      labels:
        app: code-poets-society
    spec:
      containers:
      - name: website
        image: borntoeatt/code-poets-society:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "150m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - NET_RAW
              - SYS_ADMIN
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
